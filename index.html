<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Mi Ex - Carta Final</title>
    <style>
        /* Estilos Base - Estética Emo/Oscura */
        body {
            background-image: url('fondo.gif'); /* Tu fondo animado */
            background-color: #0d0d0d; /* Fondo negro muy oscuro por si falla el gif */
            color: #d1d1d1; /* Texto gris claro, legible pero no blanco puro */
            font-family: 'Courier New', Courier, monospace; /* Fuente 'máquina de escribir', más cruda/rígida */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Contenedor Principal Rígido */
        .container {
            background-color: rgba(20, 20, 20, 0.9); /* Fondo negro translúcido para que se vea el gif */
            width: 100%;
            max-width: 1000px; /* Un poco más ancho para las columnas */
            border: 2px solid #555555; /* Borde gris rígido y afilado */
            padding: 0; /* Quitamos padding para que las secciones se extiendan hasta el borde */
            box-shadow: 10px 10px 0px rgba(85, 85, 85, 0.5); /* Sombra rígida 'glitchy' */
        }

        /* Banner Principal Rígido */
        .banner-container {
            width: 100%;
            height: auto;
            border-bottom: 2px solid #555555;
            overflow: hidden;
        }

        .banner-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Diseño de Dos Columnas */
        .main-content {
            display: flex; /* Crea las columnas */
            flex-direction: row-reverse; /* Las imágenes irán a la derecha y el texto a la izquierda */
            border-top: 2px solid #555555; /* Separación después del banner */
        }

        /* Columna de Texto - Corrido y sin interrupciones */
        .text-column {
            flex: 2; /* Ocupa 2/3 del espacio */
            padding: 30px;
            border-right: 2px solid #555555; /* Separador rígido */
            word-wrap: break-word; /* Evita que el texto largo rompa el diseño */
        }

        /* Columna de Imágenes - Tira lateral */
        .photo-column {
            flex: 1; /* Ocupa 1/3 del espacio */
            padding: 20px;
            display: flex;
            flex-direction: column; /* Apila las imágenes verticalmente */
            gap: 15px; /* Espacio entre imágenes */
            background-color: #000000; /* Fondo negro puro para la tira */
            max-height: calc(100vh - 100px); /* Altura máxima para que scrollee independientemente si es muy larga */
            overflow-y: auto; /* Permite scroll vertical en la tira de fotos */
        }

        /* Títulos de Sección (simulando los del ejemplo pero más agresivos) */
        .section-title {
            background-color: #333333; /* Gris oscuro para el fondo del título */
            color: #ff4d4d; /* Texto rojo oscuro, color acento Emo */
            display: inline-block;
            padding: 5px 15px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1em;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-left: 5px solid #ff4d4d; /* Línea lateral roja */
        }

        /* Párrafos de Texto (corrido) */
        .main-text {
            line-height: 1.8; /* Espaciado entre líneas para legibilidad */
            white-space: pre-wrap; /* Mantiene saltos de línea y espacios */
            margin-bottom: 30px; /* Espacio entre secciones */
        }

        /* Estilo para las Imágenes de la Tira Lateral - Rígidas */
        .photo-column img {
            width: 100%; /* Ocupa todo el ancho de la columna lateral */
            height: auto;
            object-fit: cover; /* Recorta la imagen si es necesario para mantener proporciones */
            border: 2px solid #555555; /* Borde gris rígido */
            filter: grayscale(80%); /* Efecto desaturado/oscuro */
            transition: filter 0.3s;
        }

        .photo-column img:hover {
            filter: grayscale(0%); /* Vuelve a color al pasar el mouse */
        }

        /* Títulos Secundarios */
        .secondary-title {
            color: #ff4d4d;
            font-weight: bold;
            margin-bottom: 10px;
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="banner-container">
            <img src="banner.png" alt="Nuestra Historia - Final">
        </div>

        <div class="main-content">
            
            <div class="text-column">
                
                <div class="section">
                    <div class="section-title">Lo que sentí por ti</div>
                    <div class="main-text">AQUÍ PON ESTO</div>
                </div>

                <div class="section">
                    <div class="section-title">Nuestras Vivencias</div>
                    <div class="main-text">AQUÍ PON ESTO</div>
                </div>

                <div class="section">
                    <div class="section-title">Lo que siento hoy</div>
                    <div class="main-text">AQUÍ PON ESTO</div>
                </div>

                <div class="section">
                    <div class="section-title">Detalles que quise darte</div>
                    <div class="main-text">AQUÍ PON ESTO</div>
                </div>

                <div class="section">
                    <div class="section-title">Cosas que me debes</div>
                    <div class="main-text">AQUÍ PON ESTO</div>
                </div>

            </div>

            <div class="photo-column">
                <div class="secondary-title">Nuestras Fotos</div>
                <img src="img1.png" alt="img1">
                <img src="img2.png" alt="img2">
                <img src="img3.png" alt="img3">
                <img src="img4.png" alt="img4">
                <img src="img5.png" alt="img5">
                <img src="img6.png" alt="img6">
                <img src="img7.png" alt="img7">
                <img src="img8.png" alt="img8">
                <img src="img9.png" alt="img9">
                <img src="img10.png" alt="img10">
                <img src="img11.png" alt="img11">
                <img src="img12.png" alt="img12">
                </div>

        </div>

        <div style="text-align: center; padding: 20px; color: #555555; border-top: 2px solid #555555;">
            Fin.
        </div>
    </div>

</body>
</html>
