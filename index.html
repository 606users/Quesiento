<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti ૮ ˶ᵔ ᵕ ᵔ˶ ა</title>
    <style>
        /* Estilos Base */
        body {
            background-image: url('fondo.gif');
            background-attachment: fixed;
            background-size: cover;
            font-family: 'Comic Sans MS', 'Verdana', sans-serif;
            color: #d14d4d;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: rgba(255, 252, 235, 0.95); /* Fondo crema suave */
            width: 100%;
            max-width: 800px;
            border: 8px solid #ff8a8a;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 10px 10px 0px #ffc1c1;
        }

        /* Banner */
        .banner {
            width: 100%;
            height: auto;
            border-radius: 15px;
            border: 3px dashed #ff8a8a;
            margin-bottom: 20px;
        }

        /* Secciones */
        .section {
            background: #ffffff;
            border: 3px solid #ffb3b3;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }

        .title-box {
            background: #ff8a8a;
            color: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9em;
        }

        p {
            line-height: 1.6;
            white-space: pre-wrap; /* Mantiene los saltos de línea */
        }

        /* Tiras de Imágenes */
        .photo-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: #ffe4e4;
            padding: 15px;
            border-radius: 15px;
        }

        .photo-strip img {
            width: 150px;
            height: 200px;
            object-fit: cover;
            border: 5px solid white;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transform: rotate(-2deg);
            transition: 0.3s;
        }

        .photo-strip img:nth-child(even) {
            transform: rotate(3deg);
        }

        .photo-strip img:hover {
            transform: rotate(0deg) scale(1.05);
        }

        /* Decoración */
        .sparkle {
            color: #ff8a8a;
            text-align: center;
            font-size: 1.5em;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="banner.png" alt="Nuestra Historia" class="banner">

        <div class="sparkle">✧･ﾟ: *✧･ﾟ:* ૮꒰ ˶• ༝ •˶꒱ა *:･ﾟ✧*:･ﾟ✧</div>

        <div class="section">
            <div class="title-box">Lo que sentí</div>
            <p>AQUÍ PON ESTO</p>
        </div>

        <div class="photo-strip">
            <img src="img1.png" alt="img1">
            <img src="img2.png" alt="img2">
            <img src="img3.png" alt="img3">
            <img src="img4.png" alt="img4">
        </div>

        <div class="section" style="margin-top: 25px;">
            <div class="title-box">Lo que vivimos juntos</div>
            <p>AQUÍ PON ESTO</p>
        </div>

        <div class="photo-strip">
            <img src="img5.png" alt="img5">
            <img src="img6.png" alt="img6">
            <img src="img7.png" alt="img7">
            <img src="img8.png" alt="img8">
        </div>

        <div class="section" style="margin-top: 25px;">
            <div class="title-box">Lo que siento ahora</div>
            <p>AQUÍ PON ESTO</p>
        </div>

        <div class="section">
            <div class="title-box">Cosas que quise darte</div>
            <p>AQUÍ PON ESTO</p>
        </div>

        <div class="section">
            <div class="title-box">Cosas que me debes</div>
            <p>AQUÍ PON ESTO</p>
        </div>

        <div class="photo-strip">
            <img src="img9.png" alt="img9">
            <img src="img10.png" alt="img10">
            <img src="img11.png" alt="img11">
            <img src="img12.png" alt="img12">
        </div>

        <div class="sparkle">Mucha suerte con tu página... ♡</div>
    </div>

</body>
</html>
